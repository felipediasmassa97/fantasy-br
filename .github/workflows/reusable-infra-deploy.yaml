name: Reusable Infra Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy (dev, demo, prod)"
        required: true
        type: string
    secrets:
      GCP_SA_KEY:
        description: "GCP Service Account Key JSON"
        required: true

env:
  GCP_PROJECT: fantasy-br

jobs:
  deploy-infra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Terraform state bucket if not exists
        run: |
          BUCKET_NAME="fantasy-br-tfstate-${{ inputs.environment }}"
          if ! gcloud storage buckets describe gs://${BUCKET_NAME} --project=${{ env.GCP_PROJECT }} > /dev/null 2>&1; then
            echo "Creating Terraform state bucket ${BUCKET_NAME}..."
            gcloud storage buckets create gs://${BUCKET_NAME} \
              --location=US \
              --project=${{ env.GCP_PROJECT }} \
              --uniform-bucket-level-access
          else
            echo "Terraform state bucket ${BUCKET_NAME} already exists"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra/envs/${{ inputs.environment }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infra/envs/${{ inputs.environment }}
        run: |
          terraform plan -no-color -out=tfplan

          if [[ $(terraform show -no-color tfplan) == *"No changes."* ]]; then
            echo "do_apply=false" >> $GITHUB_OUTPUT
          else
            echo "do_apply=true" >> $GITHUB_OUTPUT
          fi

          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: steps.plan.outputs.do_apply == 'true'
        working-directory: infra/envs/${{ inputs.environment }}
        run: terraform apply tfplan -auto-approve
