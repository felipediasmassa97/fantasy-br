version: 2

models:
  - name: stg_players
    description: Staged players data with English column names
    columns:
      - name: season
        description: Season year
      - name: round_id
        description: Round number in the season
      - name: id
        description: Unique identifier
      - name: player_name
        description: Display name
      - name: club_id
        description: Foreign key to stg_clubs
      - name: position_id
        description: Foreign key to stg_positions
      - name: pts_round
        description: Points scored in this round
      - name: pts_avg
        description: Average points per match played
      - name: has_played
        description: Whether player entered the field this round
      - name: matches_played
        description: Number of matches played in the season
      - name: scout
        description: Detailed scout statistics (nested record)

  - name: stg_clubs
    description: Staged clubs data with English column names
    columns:
      - name: id
        description: Unique identifier
      - name: abbreviation
        description: 3-letter abbreviation
      - name: label
        description: Display name

  - name: stg_positions
    description: Staged positions data with English column names
    columns:
      - name: id
        description: Unique identifier
      - name: abbreviation
        description: 2-letter abbreviation
      - name: label
        description: Display name in Portuguese

  - name: stg_schedule
    description: Staged schedule data from football-data.org
    columns:
      - name: season
        description: Season year
      - name: round_id
        description: Round number in the season (1-38)
      - name: match_id
        description: Unique identifier from football-data.org
      - name: home_team_id
        description: Football-data.org home team ID
      - name: home_team_name
        description: Home team short name
      - name: home_team_tla
        description: Home team three-letter abbreviation
      - name: away_team_id
        description: Football-data.org away team ID
      - name: away_team_name
        description: Away team short name
      - name: away_team_tla
        description: Away team three-letter abbreviation
